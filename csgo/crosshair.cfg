//准星样式 0为CSGO动态十字准星，1默认十字的静态变体，2 经典静态准星但是每侧有动态圆点，3 经典动态十字 4 经典静态十字(一般大多数人使用的) 5 走路时不动，开枪时动
cl_crosshairstyle 4; 

//是否跟随后坐力（1为跟随，0为不跟随）
cl_crosshair_recoil 0; 

//中心点（1为开，0为关）
cl_crosshairdot 1; 

//准星长度
cl_crosshairsize 0.7; 

//粗细
cl_crosshairthickness 0.7; 

//间隙
cl_crosshairgap -5; 

//轮廓线（1为开，0为关）
cl_crosshair_drawoutline 0; 

//轮廓线厚度
cl_crosshair_outlinethickness 1; 
cl_crosshaircolor_b 255;
cl_crosshaircolor_r 0;
cl_crosshaircolor_g 255;

//是否使用透明度参数（1使用，0不使用）
cl_crosshairusealpha 1; 

//透明度大小
cl_crosshairalpha 150; 

//T型准星（1为开，0为关）
cl_crosshair_t 0; 

//准星间隙是否自动调整（0不调整，1调整）
cl_crosshairgap_useweaponvalue 0; 

//灵敏度0.5
sensitivity 0.5; 
