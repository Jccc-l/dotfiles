// 开启作弊
sv_cheats								true;

// 禁用胜利条件，不会结束游戏
mp_ignore_round_win_conditions			1;

// 无限备弹
sv_infinite_ammo						2;

// 自动回血
sv_regeneration_force_on				true;

// 无摔落伤害
sv_falldamage_scale						0;

// 开局冻结时间为0
mp_freezetime							0;

// 佛指令
buddha									1;

// 最多携带1个闪光弹
ammo_grenade_limit_flashbang			1;

// 默认每个道具最多携带1个
ammo_grenade_limit_default				1;

// 一共最多可以携带5个道具
ammo_grenade_limit_total				5;

// T方自带道具
mp_t_default_grenades					"weapon_flashbang weapon_hegrenade weapon_smokegrenade weapon_molotov weapon_decoy";

// CT方自带道具
mp_ct_default_grenades					"weapon_flashbang weapon_hegrenade weapon_smokegrenade weapon_incgrenade weapon_decoy";

// 默认武器
mp_t_default_primary					weapon_ak47;
mp_t_default_secondary					weapon_deagle;
mp_ct_default_primary					weapon_m4a1;
mp_ct_default_secondary					weapon_deagle;

// 机器人相关

// 机器人静止
bot_stop								1;

// 机器人是否蹲下
// bind j "toggle bot_crouch";

// 禁用队伍不平衡
mp_autoteambalance						0;

// 佛指令对机器人不适用 0相反
buddha_ignore_bots						1;

// 重启游戏
mp_restartgame							1;
