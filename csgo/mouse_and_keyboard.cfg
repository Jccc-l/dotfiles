// 反转鼠标
mouse_inverty									0;

// 下蹲模式(0--按住，1--切换)
option_duck_method								0;

// 行走模式(0--按住，1--切换)
option_speed_method								0;

// 是否可以通过长按右键来循环切换瞄准镜的放大倍率(0--按住切换；1--按住不切换)
cl_debounce_zoom								0;

// 鼠标灵敏度
sensitivity										0.4;

// 缩放灵敏度倍数(鼠标灵敏度*缩放灵敏度倍数=开镜灵敏度)
zoom_sensitivity_ratio							1;
